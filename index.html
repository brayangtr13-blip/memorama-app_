<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COPA MEMORIA / MUNDIAL 2026</title>

    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-futbol"></i> COPA MUNDIAL</h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Movimientos</div>
                    <div class="stat-value" id="movimientos">0</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Tiempo</div>
                    <div class="stat-value" id="tiempo">00:00:00</div>
                </div>

                <div class="stat">
                    <div class="stat-label">Parejas</div>
                    <div class="stat-value" id="parejas">0/10</div>
                </div>
            </div>
        </div>

        <div class="tablero-de-juego" id="tablerodejuego"></div>



        <div class="controls">
            <button class="btn" onclick="nuevoJuego()">
                <i class="fas fa-redo"></i> NUEVO JUEGO
            </button>
        </div>
    </div>


    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2><i class="fas fa-trophy"></i> ¡Tú ganas!</h2>
            <p>Movimientos: <span id="finalMovimientos">0</span></p>
            <p>Tiempo final: <span id="finalTiempo">00:00:00</span></p>
            <button class="btn" onclick="nuevoJuego()">Reiniciar</button>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
</html>
