<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memorama del Mundial</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="encabezado">
        <h1>⚽ Memorama del Mundial ⚽</h1>
        <p>Juego de memoria - Jugadores del mundial</p>
    </header>

    <main>

        <!-- Menu para elegir nivel -->
        <section id="menu" class="seccion">
            <h2>Elige el nivel</h2>
            <div class="niveles">
                <button onclick="iniciarJuego(1)">Nivel 1<br><small>4 pares</small></button>
                <button onclick="iniciarJuego(2)">Nivel 2<br><small>6 pares</small></button>
                <button onclick="iniciarJuego(3)">Nivel 3<br><small>8 pares</small></button>
                <button onclick="iniciarJuego(4)">Nivel 4<br><small>10 pares</small></button>
            </div>
            <button class="btn-secundario" onclick="verPuntajes()">🏆 Ver mejores puntajes</button>
        </section>

        <!-- Zona del juego -->
        <section id="juego" class="seccion oculto">
            <div class="marcador">
                <span>Nivel: <b id="nivel-actual">1</b></span>
                <span>Tiempo: <b id="tiempo">0</b>s</span>
                <span>Movimientos: <b id="movimientos">0</b></span>
                <span>Pares: <b id="pares">0</b></span>
            </div>
            <p id="mensaje" class="mensaje"></p>
            <div id="tablero" class="tablero"></div>
            <button class="btn-secundario" onclick="volverMenu()">← Volver al menú</button>
        </section>

        <!-- Formulario para guardar el puntaje -->
        <section id="guardar" class="seccion oculto">
            <h2>🎉 ¡Ganaste!</h2>
            <p>Tu puntuación fue: <b id="puntos-finales">0</b> puntos</p>
            <form id="formulario" onsubmit="guardarPuntaje(event)">
                <label for="nombre">Nombre del jugador:</label>
                <input type="text" id="nombre" maxlength="15" placeholder="Escribe tu nombre" required>

                <label for="puntaje">Puntuación:</label>
                <input type="text" id="puntaje" readonly>

                <button type="submit">Guardar puntaje</button>
            </form>
        </section>

        <!-- Tabla de los 10 mejores -->
        <section id="puntajes" class="seccion oculto">
            <h2>🏆 Los 10 mejores</h2>
            <table id="tabla-puntajes">
                <thead>
                    <tr>
                        <th>Puesto</th>
                        <th>Jugador</th>
                        <th>Nivel</th>
                        <th>Tiempo</th>
                        <th>Puntos</th>
                    </tr>
                </thead>
                <tbody id="cuerpo-tabla">
                </tbody>
            </table>
            <button onclick="volverMenu()">Jugar</button>
            <button class="btn-secundario" onclick="borrarPuntajes()">Borrar todo</button>
        </section>

    </main>

    <footer class="pie">
        <p>Proyecto Memorama - Curso Front-End SENA</p>
    </footer>

    <script src="assets/js/main.js"></script>
</body>
</html>
